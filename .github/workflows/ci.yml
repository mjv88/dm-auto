name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: runner_test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test -- --coverage --passWithNoTests

      - name: Integration tests
        timeout-minutes: 5
        run: npx jest --config jest.config.integration.js --passWithNoTests --forceExit --detectOpenHandles
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/runner_test

      - name: Docker build
        run: docker build . -t runner-api-test

  auto-merge:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'feature/')
    steps:
      - uses: actions/checkout@v4
      - name: Auto-merge feature PR
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
