name: Deploy to Coolify

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'pwa/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy runner-api
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "http://46.224.229.119:8000/api/v1/deploy?uuid=v11gk4n5aa8jt3a7nsb7kgi5&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" -ge 400 ]; then echo "Deploy failed with HTTP $http_code"; exit 1; fi

      - name: Deploy runner-pwa
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            "http://46.224.229.119:8000/api/v1/deploy?uuid=ks21626vpo6js88uktyqnqcj&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" -ge 400 ]; then echo "Deploy failed with HTTP $http_code"; exit 1; fi
