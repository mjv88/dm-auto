version: '3.9'

services:
  api:
    build:
      context: .
      target: builder
    command: npm run dev
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://runner:password@postgres:5432/runner_app
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: runner
      POSTGRES_PASSWORD: password
      POSTGRES_DB: runner_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U runner -d runner_app']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
